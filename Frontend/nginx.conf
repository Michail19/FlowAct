map $http_x_user_id $flowact_user_id {
    default $http_x_user_id;
    "" "00000000-0000-0000-0000-000000000001";
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend calls /api/v1/..., backend already has /api/v1/..., so keep the URI unchanged.
    location /api/ {
        proxy_pass http://execution-service:8082;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Local-dev fallback because current ExecutionService expects X-User-Id,
        # while Auth/API Gateway is not present in this branch yet.
        proxy_set_header X-User-Id $flowact_user_id;
    }

    location /actuator/ {
        proxy_pass http://execution-service:8082;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
