server.port=8082

# PostgreSQL local/dev
spring.datasource.url=jdbc:postgresql://localhost:5432/flowact_execution
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.show-sql=true

# Flyway
spring.flyway.clean-disabled=true

# Logging - more verbose for local debugging
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.ms.executionservice=DEBUG

# Local service URLs
flowact.services.workflow.base-url=http://localhost:8081
flowact.services.ml.base-url=http://localhost:8000
flowact.services.gateway.base-url=http://localhost:8080
