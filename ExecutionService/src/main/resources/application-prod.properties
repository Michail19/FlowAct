server.port=${SERVER_PORT:8082}

# PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.show-sql=false

# Flyway
spring.flyway.clean-disabled=true

# OpenAPI
springdoc.api-docs.enabled=${OPENAPI_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_UI_ENABLED:false}

# Actuator
management.endpoint.health.show-details=never

# Logging
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.org.springframework.web=${LOG_LEVEL_WEB:WARN}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:WARN}
logging.level.org.hibernate.orm.jdbc.bind=${LOG_LEVEL_BIND:WARN}
logging.level.com.ms.executionservice=${LOG_LEVEL_APP:INFO}

# Internal service URLs
flowact.services.workflow.base-url=${WORKFLOW_SERVICE_URL}
flowact.services.ml.base-url=${ML_SERVICE_URL}
flowact.services.gateway.base-url=${GATEWAY_SERVICE_URL}

# Timeouts (ms)
flowact.http.connect-timeout=${HTTP_CONNECT_TIMEOUT:5000}
flowact.http.read-timeout=${HTTP_READ_TIMEOUT:15000}

# Execution settings
flowact.execution.max-depth=${EXECUTION_MAX_DEPTH:100}
flowact.execution.default-page-size=${EXECUTION_DEFAULT_PAGE_SIZE:20}
flowact.execution.max-page-size=${EXECUTION_MAX_PAGE_SIZE:100}
