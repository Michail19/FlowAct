spring.application.name=execution-service

server.port=${SERVER_PORT:8082}

# Active profile can be overridden:
# SPRING_PROFILES_ACTIVE=init
# SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:init}

# ======================
# DATASOURCE
# ======================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ======================
# JPA
# ======================
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ======================
# FLYWAY
# ======================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ======================
# JACKSON
# ======================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ======================
# OPENAPI
# ======================
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=${OPENAPI_ENABLED:true}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=${SWAGGER_UI_ENABLED:true}
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.show-actuator=false
springdoc.default-produces-media-type=application/json

# ======================
# ACTUATOR
# ======================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=${HEALTH_DETAILS:always}

# ======================
# LOGGING
# ======================
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.org.springframework.web=${LOG_LEVEL_WEB:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:INFO}
logging.level.org.hibernate.orm.jdbc.bind=${LOG_LEVEL_BIND:INFO}
logging.level.com.ms.executionservice=${LOG_LEVEL_APP:INFO}

# ======================
# INTERNAL SERVICES
# ======================
flowact.services.auth.base-url=${AUTH_SERVICE_URL:http://localhost:8083}
flowact.services.ml.base-url=${ML_SERVICE_URL:http://localhost:8000}
flowact.services.gateway.base-url=${GATEWAY_SERVICE_URL:http://localhost:8080}
flowact.services.schedule.base-url=${SCHEDULE_SERVICE_URL:http://localhost:8084}

# ======================
# HTTP TIMEOUTS
# ======================
flowact.http.connect-timeout=${HTTP_CONNECT_TIMEOUT:5000}
flowact.http.read-timeout=${HTTP_READ_TIMEOUT:15000}

# ======================
# EXECUTION SETTINGS
# ======================
flowact.execution.max-depth=${EXECUTION_MAX_DEPTH:100}
flowact.execution.default-page-size=${EXECUTION_DEFAULT_PAGE_SIZE:20}
flowact.execution.max-page-size=${EXECUTION_MAX_PAGE_SIZE:100}

### =========================
### KAFKA CONFIG
### =========================

# Kafka bootstrap servers
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Producer serializers
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ????????? ?????????? type headers
spring.kafka.producer.properties.spring.json.add.type.headers=false

# ??????? default topic
spring.kafka.template.default-topic=flowact.execution.run.requested

### =========================
### FLOWACT KAFKA TOPICS
### =========================

flowact.kafka.execution.run-requested-topic=${FLOWACT_KAFKA_EXECUTION_RUN_REQUESTED_TOPIC:flowact.execution.run.requested}
