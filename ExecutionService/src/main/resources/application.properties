spring.application.name=execution-service

server.port=8082

# Active profile can be overridden:
# SPRING_PROFILES_ACTIVE=init
# SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=init

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# JPA
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.show-actuator=false
springdoc.default-produces-media-type=application/json

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.orm.jdbc.bind=INFO

# Internal service URLs
flowact.services.workflow.base-url=http://localhost:8081
flowact.services.ml.base-url=http://localhost:8000
flowact.services.gateway.base-url=http://localhost:8080

# Timeouts (ms)
flowact.http.connect-timeout=5000
flowact.http.read-timeout=15000

# Execution settings
flowact.execution.max-depth=100
flowact.execution.default-page-size=20
flowact.execution.max-page-size=100
