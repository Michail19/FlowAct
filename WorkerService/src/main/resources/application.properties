spring.application.name=WorkerService

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/flowact_execution}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

flowact.ml.base-url=${FLOWACT_ML_BASE_URL:http://localhost:8082}
flowact.ml.predict-path=${FLOWACT_ML_PREDICT_PATH:/predict}

flowact.llm.openrouter.base-url=${FLOWACT_LLM_OPENROUTER_BASE_URL:https://openrouter.ai}
flowact.llm.openrouter.chat-path=${FLOWACT_LLM_OPENROUTER_CHAT_PATH:/api/v1/chat/completions}
flowact.llm.openrouter.api-key=${FLOWACT_LLM_OPENROUTER_API_KEY:}
flowact.llm.openrouter.default-model=${FLOWACT_LLM_OPENROUTER_DEFAULT_MODEL:openrouter/free}
flowact.llm.openrouter.site-url=${FLOWACT_LLM_OPENROUTER_SITE_URL:}
flowact.llm.openrouter.app-name=${FLOWACT_LLM_OPENROUTER_APP_NAME:FlowAct}
flowact.llm.openrouter.allow-paid-models=${FLOWACT_LLM_OPENROUTER_ALLOW_PAID_MODELS:false}

### =========================
### KAFKA CONFIG
### =========================

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:flowact-execution-worker}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.enable-auto-commit=false

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

### =========================
### FLOWACT KAFKA TOPICS
### =========================

flowact.kafka.execution.resume-requested-topic=${FLOWACT_KAFKA_EXECUTION_RESUME_REQUESTED_TOPIC:flowact.execution.resume.requested}
flowact.kafka.execution.resume-requested-group-id=${FLOWACT_KAFKA_EXECUTION_RESUME_REQUESTED_GROUP_ID:flowact-execution-worker}

flowact.kafka.execution.run-requested-topic=${FLOWACT_KAFKA_EXECUTION_RUN_REQUESTED_TOPIC:flowact.execution.run.requested}
flowact.kafka.execution.run-requested-group-id=${FLOWACT_KAFKA_EXECUTION_RUN_REQUESTED_GROUP_ID:flowact-execution-worker}

flowact.kafka.execution.retry-requested-topic=${FLOWACT_KAFKA_EXECUTION_RETRY_REQUESTED_TOPIC:flowact.execution.retry.requested}
flowact.kafka.execution.retry-requested-group-id=${FLOWACT_KAFKA_EXECUTION_RETRY_REQUESTED_GROUP_ID:flowact-execution-worker}

flowact.kafka.execution.cancel-requested-topic=${FLOWACT_KAFKA_EXECUTION_CANCEL_REQUESTED_TOPIC:flowact.execution.cancel.requested}
flowact.kafka.execution.cancel-requested-group-id=${FLOWACT_KAFKA_EXECUTION_CANCEL_REQUESTED_GROUP_ID:flowact-execution-worker}
