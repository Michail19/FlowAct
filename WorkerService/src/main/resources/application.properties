spring.application.name=WorkerService

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/flowact_execution}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

### =========================
### KAFKA CONFIG
### =========================

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:flowact-execution-worker}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.enable-auto-commit=false

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.ms.workerservice.execution.event.ExecutionRunRequestedEvent

### =========================
### FLOWACT KAFKA TOPICS
### =========================

flowact.kafka.execution.run-requested-topic=${FLOWACT_KAFKA_EXECUTION_RUN_REQUESTED_TOPIC:flowact.execution.run.requested}
flowact.kafka.execution.run-requested-group-id=${FLOWACT_KAFKA_EXECUTION_RUN_REQUESTED_GROUP_ID:flowact-execution-worker}

flowact.kafka.execution.retry-requested-topic=${FLOWACT_KAFKA_EXECUTION_RETRY_REQUESTED_TOPIC:flowact.execution.retry.requested}
flowact.kafka.execution.retry-requested-group-id=${FLOWACT_KAFKA_EXECUTION_RETRY_REQUESTED_GROUP_ID:flowact-execution-worker}

flowact.kafka.execution.cancel-requested-topic=${FLOWACT_KAFKA_EXECUTION_CANCEL_REQUESTED_TOPIC:flowact.execution.cancel.requested}
flowact.kafka.execution.cancel-requested-group-id=${FLOWACT_KAFKA_EXECUTION_CANCEL_REQUESTED_GROUP_ID:flowact-execution-worker}
